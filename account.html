<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account | Pack Your Bags</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="wrapper">
        <form action="" class="account-form" id="accountChoice">
            <h1>Add Account</h1>
            <p class="account-subtext">Choose how you want to continue.</p>

            <div class="account-actions">
                <a href="signup.html" class="btn action-btn primary-action">
                    <i class='bx bx-user-plus'></i>
                    Sign Up
                </a>

                <a href="login.html" class="btn action-btn secondary-action">
                    <i class='bx bx-log-in-circle'></i>
                    Log In
                </a>
            </div>
        </form>
    </div>

</body>
</html>
